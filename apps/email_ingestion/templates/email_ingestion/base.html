<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ezer{% block title %}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }
    nav { background: #1a1a1a; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
    nav a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.7; }
    nav a.brand { opacity: 1; font-weight: 600; font-size: 16px; }
    nav a:hover { opacity: 1; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .muted { color: #666; font-size: 14px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge.approved { background: #d4edda; color: #1a6b30; }
    .badge.blocked { background: #fde8e8; color: #9b1c1c; }
    .badge.ambiguous { background: #fff3cd; color: #856404; }
    .badge.pending { background: #e2e8f0; color: #475569; }
    .badge.high { background: #d4edda; color: #1a6b30; }
    .badge.medium { background: #fff3cd; color: #856404; }
    .badge.low { background: #fde8e8; color: #9b1c1c; }
    .card { background: #fff; border-radius: 8px; border: 1px solid #e5e5e5; padding: 24px; margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; border: none; }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-secondary { background: #f0f0f0; color: #1a1a1a; }
    .btn:hover { opacity: 0.85; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e5e5; color: #666; font-weight: 500; }
    td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .empty { text-align: center; padding: 48px; color: #999; }
    .upload-form { margin-bottom: 24px; }
    .upload-form input[type=file] { margin-right: 12px; }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    .alert.success { background: #d4edda; color: #1a6b30; }
    .alert.error { background: #fde8e8; color: #9b1c1c; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">Ezer</a>
    <a href="/">Projects</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
    <script>
      function toggleMessage(id) {
        var row = document.getElementById('msg-' + id);
        var arrow = document.getElementById('arrow-' + id);
        var isOpen = row.style.display !== 'none';
        row.style.display = isOpen ? 'none' : 'table-row';
        arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
      }
    </script>
</body>
</html>
